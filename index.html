<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTX W3DA Trade Form</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f5f5f7;
    margin: 0;
    padding: 20px;
  }

  .form-container {
    max-width: 400px;
    margin: 20px auto;
    background: #fff;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  }

  h2 {
    text-align: center;
    color: #1a73e8;
    margin-bottom: 15px;
  }

  p.instruction {
    text-align: center;
    color: #555;
    font-size: 14px;
    margin-bottom: 20px;
  }

  label {
    display: block;
    margin-top: 12px;
    font-weight: bold;
    color: #333;
  }

  input, select {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border-radius: 10px;
    margin-top: 5px;
    border: 1px solid #ccc;
    box-sizing: border-box;
  }

  input:focus, select:focus {
    border-color: #1a73e8;
    box-shadow: 0 0 5px rgba(26,115,232,0.5);
    outline: none;
  }

  button {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    border-radius: 12px;
    background-color: #1a73e8;
    color: white;
    border: none;
    cursor: pointer;
    margin-top: 20px;
    font-weight: bold;
  }

  button:hover {
    background-color: #155bb5;
  }

  #confirmation {
    margin-top: 15px;
    text-align: center;
    font-weight: bold;
    color: green;
    display: none;
  }
</style>
</head>
<body>

<div class="form-container">
  <h2>GTX W3DA Trade Form</h2>
  <p class="instruction">📎 After clicking Submit, WhatsApp will open. You can attach your proof image manually.</p>

  <form id="tradeForm">
    <label>Type:</label>
    <select id="type">
      <option value="Buy">Buy</option>
      <option value="Sell">Sell</option>
    </select>

    <label>Asset:</label>
    <input id="asset" placeholder="BTC / USDT / Gift Card" />

    <label>Amount:</label>
    <input id="amount" placeholder="Amount" />

    <label>Wallet / Card details:</label>
    <input id="details" placeholder="Wallet or Card info" />

    <button type="submit">Submit</button>
  </form>

  <p id="confirmation"></p>
</div>

<script>
document.getElementById('tradeForm').addEventListener('submit', function(e){
  e.preventDefault(); // prevent default form submission

  const type = encodeURIComponent(document.getElementById('type').value);
  const asset = encodeURIComponent(document.getElementById('asset').value);
  const amount = encodeURIComponent(document.getElementById('amount').value);
  const details = encodeURIComponent(document.getElementById('details').value);

  const phone = "2347055912658"; // replace with your WhatsApp number
  const message = `Type: ${type}\nAsset: ${asset}\nAmount: ${amount}\nDetails: ${details}`;
  const url = `https://wa.me/${phone}?text=${message}`;

  // Show confirmation
  const confirmation = document.getElementById('confirmation');
  confirmation.textContent = "✅ Your trade request is ready to send on WhatsApp!";
  confirmation.style.display = "block";

  // Open WhatsApp after 1 second
  setTimeout(() => {
    window.open(url, '_blank');
  }, 1000);
});
</script>

</body>
</html>
